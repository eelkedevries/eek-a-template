# copier.yml — eek-a-dev project template
#
# Canonical, deterministic skeleton for new eek-a-dev projects. Run with:
#   copier copy gh:OWNER/eek-a-template ./my-project
# or non-interactively (as the skill does):
#   copier copy --defaults --data project_name=my-project --data stack_kind=node \
#     ... gh:OWNER/eek-a-template ./my-project
#
# `copier update` re-applies template changes to an existing project, because a
# .copier-answers.yml is written into each generated repo (see _answers_file).

_subdirectory: template
_templates_suffix: .jinja
_answers_file: .copier-answers.yml

# Files that exist in template/ for structure but should never be copied.
_exclude:
  - "copier.yml"
  - "~*"
  - "__pycache__"
  - ".git"
  - ".DS_Store"

# --------------------------------------------------------------------------- #
# Identity
# --------------------------------------------------------------------------- #
project_name:
  type: str
  help: "Repository name (lowercase; letters, digits, '-', '_', '.')."
  validator: >-
    {% if not (project_name | regex_search('^[a-z0-9]([a-z0-9._-]*[a-z0-9])?$')) %}
    project_name must be lowercase GitHub-style, e.g. my-project
    {% endif %}

project_title:
  type: str
  help: "Human-readable title."
  default: "{{ project_name.replace('-', ' ').replace('_', ' ').replace('.', ' ') | title }}"

description:
  type: str
  help: "One-line description. Seeds the README and overview."

# --------------------------------------------------------------------------- #
# Stack
# --------------------------------------------------------------------------- #
stack_kind:
  type: str
  help: "Stack family (drives the scaffold, CI, and static-site default)."
  choices:
    "Node (Vite / Svelte / React / Vue / TS)": node
    "Static HTML": static-html
    "Python": python
    "R": r
    "Other / mixed": other
  default: node

stack:
  type: str
  help: "Free-text stack description, e.g. 'node-vite + typescript', 'python', 'psychopy'."
  default: >-
    {% if stack_kind == 'node' %}node-vite + typescript{% elif stack_kind == 'static-html' %}static-html{% elif stack_kind == 'python' %}python{% elif stack_kind == 'r' %}r{% else %}other{% endif %}

# --------------------------------------------------------------------------- #
# Repository
# --------------------------------------------------------------------------- #
visibility:
  type: str
  help: "GitHub repository visibility."
  choices: ["public", "private"]
  default: public

static_site:
  type: bool
  help: "Does this project publish a static website (e.g. GitHub Pages)?"
  default: "{{ stack_kind in ['node', 'static-html'] }}"

# Only asked when the conflict exists; confirms an external host or paid plan.
# The validator here is the hard guard: a private GitHub-Pages site is refused
# on GitHub Free unless this is explicitly set true (paid plan / external host).
allow_private_static:
  type: bool
  help: >-
    Private + static needs a paid plan or an external host (Netlify / Cloudflare
    / Vercel). Confirm you have one, else answer No and make the repo public.
  default: false
  when: "{{ static_site and visibility == 'private' }}"
  validator: >-
    {% if not allow_private_static %}
    Private + static website is not possible on GitHub Free: GitHub Pages will
    not serve a private repo without a paid plan. Make the repo public, use a
    paid plan, host on Netlify/Cloudflare/Vercel, or keep it private with no
    live site.
    {% endif %}

# Computed deploy base path (GitHub project Pages live under /<repo>/).
base_path:
  type: str
  when: false
  default: "{% if static_site %}/{{ project_name }}/{% endif %}"

# --------------------------------------------------------------------------- #
# Conventions (sensible defaults; British English + commit-to-main house style)
# --------------------------------------------------------------------------- #
language_locale:
  type: str
  help: "Language / locale convention."
  default: "British English in code, comments, and user-facing text."

workflow_policy:
  type: str
  help: "Commit / branch / push policy."
  default: "commit and push directly to `main`; no feature branches or pull requests unless explicitly requested."

verify_command:
  type: str
  help: "Verify command run before each commit (blank to leave the default note)."
  default: "{% if stack_kind == 'node' %}`npm run check` (after the scaffold exists).{% endif %}"

testing_policy:
  type: str
  help: "Testing policy."
  default: "no tests unless a prompt asks for them."

# --------------------------------------------------------------------------- #
# Licence (optional)
# --------------------------------------------------------------------------- #
license:
  type: str
  help: "Licence to include."
  choices: ["none", "MIT"]
  default: none

author:
  type: str
  help: "Copyright holder for the licence (optional)."
  default: ""
  when: "{{ license != 'none' }}"

year:
  type: str
  help: "Copyright year (the skill passes the current year)."
  default: "2026"
  when: "{{ license != 'none' }}"
